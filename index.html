<style>
:root{
  --bg:#000;--s:#0a0a0a;--c:#111;--c2:#0d0d0d;
  --b:#1c1c1c;--g:#39ff14;--r:#ff2d2d;--y:#ffd740;--p:#b388ff;
  --t:#e8e8e8;--m:#555;--d:#1a1a1a;
  --mono:'Space Mono',monospace;--sans:'Syne',sans-serif;
  --sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t);font-family:var(--sans);display:flex;flex-direction:column;height:100dvh}

/* SCROLL AREA */
#app{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 calc(68px + var(--sb));-webkit-overflow-scrolling:touch}

/* TOP BAR — account switcher */
#topbar{background:#000;border-bottom:1px solid var(--b);padding:8px 12px;z-index:100;flex-shrink:0}
.acc-dropdown-wrap{position:relative;display:inline-block}
.acc-dropdown-btn{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:50px;border:1px solid var(--g);background:rgba(57,255,20,.08);color:var(--g);font-family:var(--sans);font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.acc-dropdown-btn:active{opacity:.8}
.acc-dropdown-arrow{font-size:10px;transition:transform .2s;display:inline-block}
.acc-dropdown-arrow.open{transform:rotate(180deg)}
.acc-dropdown-menu{position:absolute;top:calc(100% + 6px);left:0;min-width:200px;background:#0e0e0e;border:1px solid var(--b);border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.7);z-index:999;overflow:hidden;display:none}
.acc-dropdown-menu.open{display:block}
.acc-dropdown-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:700;color:var(--t);border-bottom:1px solid var(--b);transition:background .1s}
.acc-dropdown-item:last-child{border-bottom:none}
.acc-dropdown-item:active{background:rgba(255,255,255,.06)}
.acc-dropdown-item.active{color:var(--g);background:rgba(57,255,20,.07)}
.acc-dropdown-item.add-item{color:var(--m);font-weight:600}
.acc-dropdown-item.add-item:active{background:rgba(57,255,20,.06)}

/* BOTTOM NAV */
#bnav{position:fixed;bottom:0;left:0;right:0;height:calc(56px + var(--sb));padding-bottom:var(--sb);background:rgba(0,0,0,.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--b);display:flex;z-index:200}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--m);font-family:var(--sans);font-size:8px;font-weight:700;cursor:pointer;letter-spacing:.3px}
.nb.active{color:var(--g)}
.nb svg{width:18px;height:18px;stroke-width:2}
.ndot{width:3px;height:3px;border-radius:50%;background:var(--g);opacity:0}
.nb.active .ndot{opacity:1}

/* FAB */
.fab{position:fixed;bottom:calc(72px + var(--sb));right:16px;width:48px;height:48px;border-radius:50%;background:var(--g);color:#000;border:none;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 20px rgba(57,255,20,.55),0 0 50px rgba(57,255,20,.15);z-index:150;font-weight:700}
.fab:active{transform:scale(.9)}

/* PAGE */
.pg{padding:12px 14px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ptitle{font-size:18px;font-weight:800;letter-spacing:-.5px}

/* CARDS */
.card{background:var(--c);border:1px solid var(--b);border-radius:14px;padding:13px;margin-bottom:10px}
.ct{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--m);margin-bottom:10px}

/* STAT GRID */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sc{background:var(--c2);border:1px solid var(--b);border-radius:12px;padding:10px 12px}
.sl{font-size:9px;color:var(--m);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.sv{font-family:var(--mono);font-size:14px;font-weight:700;line-height:1}
.ss{font-size:10px;color:var(--m);margin-top:2px}
.g{color:var(--g)}.r{color:var(--r)}.a{color:var(--g)}.y{color:var(--y)}

/* TRADE ROW */
.tr{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--b);gap:7px;cursor:pointer}
.tr:last-child{border-bottom:none}
.tr:active{opacity:.65}
.tsym{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--g);width:52px;flex-shrink:0}
.tsd{font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;flex-shrink:0}
.tsd.L{background:rgba(57,255,20,.1);color:var(--g);border:1px solid rgba(57,255,20,.25)}
.tsd.S{background:rgba(255,45,45,.1);color:var(--r);border:1px solid rgba(255,45,45,.25)}
.ti{flex:1;min-width:0}
.td{font-size:10px;color:var(--m)}
.tn{font-size:10px;color:var(--m);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tp{font-family:var(--mono);font-size:12px;font-weight:700}
.trr{font-family:var(--mono);font-size:9px;color:var(--m);text-align:right}
.tthumb{width:30px;height:30px;border-radius:5px;object-fit:cover;border:1px solid var(--b);flex-shrink:0}

/* CALENDAR */
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cdl{text-align:center;font-size:10px;color:#777;font-weight:700;padding-bottom:6px}
.cd{border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 2px;min-height:52px;cursor:pointer;transition:transform .1s}
.cd:active{transform:scale(.88)}
.cd.empty{background:transparent;cursor:default}
.cd.notr{background:#111;color:#333}
.cd.win{background:rgba(57,255,20,.13);border:1px solid rgba(57,255,20,.2)}
.cd.loss{background:rgba(255,45,45,.13);border:1px solid rgba(255,45,45,.2)}
.cd.today{outline:2px solid var(--g);outline-offset:-2px}
.cdn{font-size:12px;font-weight:800;color:#fff}
.cd.notr .cdn{color:#444}
.cdcount{font-size:8px;font-weight:700;margin-top:2px;opacity:.8}
.cd.win .cdcount{color:var(--g)}
.cd.loss .cdcount{color:var(--r)}
.cdp{font-size:8px;font-family:var(--mono);margin-top:1px;font-weight:700}
.cd.win .cdp{color:var(--g)}
.cd.loss .cdp{color:var(--r)}
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mnb{background:var(--c2);border:1px solid var(--b);color:var(--t);border-radius:8px;padding:5px 13px;cursor:pointer;font-size:16px}
.mname{font-size:15px;font-weight:800;text-transform:capitalize}

/* PROGRESS */
.pb{height:7px;background:var(--d);border-radius:4px;overflow:hidden;margin-top:5px}
.pf{height:100%;border-radius:4px;transition:width .4s}

/* OVERLAYS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:300;display:flex;align-items:flex-end}
.sheet{background:#0a0a0a;border:1px solid var(--b);border-radius:22px 22px 0 0;padding:22px 18px calc(22px + var(--sb));width:100%;max-height:92dvh;overflow-y:auto}
.ftitle{font-size:17px;font-weight:800;margin-bottom:16px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.fl{font-size:10px;color:var(--m);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.fi{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:10px 12px;color:var(--t);font-family:var(--sans);font-size:14px;outline:none;width:100%}
.fi:focus{border-color:var(--g)}
select.fi{appearance:none}
.btn{padding:13px;border-radius:12px;font-family:var(--sans);font-size:14px;font-weight:700;border:none;cursor:pointer;width:100%;margin-top:5px}
.btn:active{opacity:.75}
.bp{background:var(--g);color:#000}
.bs{background:var(--c);color:var(--m);border:1px solid var(--b)}
.bai{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff}
.br{background:rgba(255,45,45,.1);color:var(--r);border:1px solid rgba(255,45,45,.25)}

/* SCREENSHOT DROP */
.dropz{border:2px dashed var(--b);border-radius:12px;padding:16px;text-align:center;cursor:pointer;margin-bottom:9px}
.dropz.over{border-color:var(--g);background:rgba(57,255,20,.04)}
.sprev{width:100%;border-radius:10px;display:block;margin-bottom:6px}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:13px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 14px;border-radius:10px;border:1px solid var(--b);background:transparent;color:var(--m);font-family:var(--sans);font-weight:700;font-size:12px;cursor:pointer}
.tab.active{background:rgba(57,255,20,.1);border-color:var(--g);color:var(--g)}

/* CHART */
.cw{position:relative;height:170px;margin-top:8px}
.cw2{position:relative;height:200px;margin-top:8px}

/* AI */
.ai-wrap{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(79,70,229,.08));border:1px solid rgba(124,58,237,.3);border-radius:16px;padding:15px;margin-bottom:12px}
.ai-txt{font-size:13px;line-height:1.75;color:var(--t)}
.ai-txt h4{font-size:10px;color:var(--p);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin:13px 0 5px}
.ai-txt h4:first-child{margin-top:0}
.ai-dots{display:flex;gap:6px;padding:8px 0;align-items:center}
.ai-dot{width:8px;height:8px;border-radius:50%;background:var(--p);animation:pd 1.2s ease-in-out infinite}
.ai-dot:nth-child(2){animation-delay:.2s}.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes pd{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* MARKET SELECTOR BUTTONS */
.mkt-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--b);background:transparent;color:var(--m);font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;flex-shrink:0}
.mkt-btn.active{background:rgba(57,255,20,.1);border-color:var(--g);color:var(--g)}

/* STATUS BUTTONS */
.status-btn{flex:1;padding:9px 6px;border-radius:10px;border:1px solid var(--b);background:transparent;color:var(--m);font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
.status-btn.active{border-color:var(--g);background:rgba(57,255,20,.1);color:var(--g)}
.status-btn.tp-active{border-color:var(--g);background:rgba(57,255,20,.15);color:var(--g)}
.status-btn.sl-active{border-color:var(--r);background:rgba(255,45,45,.15);color:var(--r)}
.status-btn.be-active{border-color:var(--y);background:rgba(255,215,64,.1);color:var(--y)}

/* OPEN TRADE BADGE */
.open-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,215,64,.12);border:1px solid rgba(255,215,64,.3);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;color:var(--y)}
.tp-badge{background:rgba(57,255,20,.12);border-color:rgba(57,255,20,.3);color:var(--g)}
.sl-badge{background:rgba(255,45,45,.12);border-color:rgba(255,45,45,.3);color:var(--r)}
.be-badge{background:rgba(255,215,64,.1);border-color:rgba(255,215,64,.3);color:var(--y)}

/* PAIR SUGGESTIONS */
#pair-suggestions div{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--b);font-family:var(--mono);font-weight:700;color:var(--t)}
#pair-suggestions div:last-child{border-bottom:none}
#pair-suggestions div:hover{background:rgba(57,255,20,.07);color:var(--g)}

/* ACCOUNT CARD */
.acc-card{border-radius:16px;padding:15px;margin-bottom:12px;border:1px solid;cursor:pointer;position:relative;overflow:hidden}
.acc-card:active{opacity:.8}
.acc-card.live{background:rgba(57,255,20,.04);border-color:rgba(57,255,20,.22)}
.acc-card.prop{background:rgba(57,255,20,.03);border-color:rgba(57,255,20,.15)}
.acc-card.demo{background:rgba(255,215,64,.03);border-color:rgba(255,215,64,.2)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:44px 20px;color:var(--m)}
.empty-state .icon{font-size:42px;margin-bottom:12px}
.empty-state h3{font-size:16px;font-weight:800;color:var(--t);margin-bottom:6px}
.empty-state p{font-size:13px;line-height:1.6}

/* NO ACCOUNT SELECTED */
.no-acc{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:14px;padding:20px;text-align:center}

/* ══════════════════════════════
   DESKTOP RESPONSIVE (≥900px)
══════════════════════════════ */
@media(min-width:900px){
  html,body{overflow:hidden;height:100vh}

  /* Hide mobile bottom nav & FAB */
  #bnav{display:none}
  .fab{display:none}

  /* Full layout: sidebar + topbar + content */
  body{flex-direction:row}

  /* LEFT SIDEBAR */
  #sidebar{
    width:220px;flex-shrink:0;
    background:#000;border-right:1px solid var(--b);
    display:flex;flex-direction:column;
    height:100vh;z-index:100;
  }
  .sb-logo{
    padding:24px 20px 16px;
    font-family:var(--mono);font-size:18px;font-weight:700;
    color:var(--g);letter-spacing:-1px;
    border-bottom:1px solid var(--b);
    text-shadow:0 0 20px rgba(57,255,20,.4);
  }
  .sb-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:4px}
  .sb-btn{
    display:flex;align-items:center;gap:12px;
    padding:11px 14px;border-radius:12px;
    background:transparent;border:none;
    color:var(--m);font-family:var(--sans);font-size:13px;font-weight:700;
    cursor:pointer;transition:all .15s;text-align:left;width:100%;
  }
  .sb-btn svg{width:18px;height:18px;flex-shrink:0;stroke-width:2}
  .sb-btn:hover{background:var(--c);color:var(--t)}
  .sb-btn.active{background:rgba(57,255,20,.1);color:var(--g);border:1px solid rgba(57,255,20,.15)}
  .sb-add{
    margin:12px 10px 20px;
    background:var(--g);color:#000;border:none;border-radius:12px;
    padding:12px;font-family:var(--sans);font-size:13px;font-weight:700;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
    box-shadow:0 0 18px rgba(57,255,20,.4);
    transition:opacity .15s;
  }
  .sb-add:hover{opacity:.85}

  /* RIGHT CONTENT AREA */
  #right{display:flex;flex-direction:column;flex:1;min-width:0;height:100vh}

  /* TOP BAR becomes account switcher strip */
  #topbar{border-bottom:1px solid var(--b);padding:10px 20px;flex-shrink:0}
  .acc-dropdown-btn{font-size:13px;padding:8px 18px}

  /* Scrollable content */
  #app{
    flex:1;overflow-y:auto;overflow-x:hidden;
    padding:0 0 20px;
    -webkit-overflow-scrolling:touch;
  }

  /* PAGE inner padding for desktop */
  .pg{padding:24px 28px;max-width:1200px;margin:0 auto}

  /* 3-col stat grid on desktop */
  .sg{grid-template-columns:repeat(3,1fr)}

  /* 2-col layout for journal content */
  .desk-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
  .desk-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;align-items:start}
  .desk-full{grid-column:1/-1}

  /* Bigger charts on desktop */
  .cw{height:220px}
  .cw2{height:260px}

  /* Wider sheet modals on desktop */
  .ov{align-items:center;justify-content:center}
  .sheet{border-radius:20px;max-width:560px;max-height:88vh;padding:28px 28px 28px}

  /* Calendar bigger cells */
  .cd{min-height:70px}
  .cdn{font-size:14px}
  .cdpair{font-size:9px}
  .cdp{font-size:8px}

  /* Trade row hover */
  .tr:hover{background:rgba(255,255,255,.03);border-radius:8px;margin:0 -6px;padding-left:6px;padding-right:6px}

  /* Card hover */
  .card:hover{border-color:rgba(57,255,20,.12)}
}

@media(max-width:899px){
  #sidebar{display:none}
  #right{display:contents}
}
</style>

  // ── Pantalla de cuenta pendiente ─────────────────────────
  function showPending(user) {
    document.body.innerHTML = `
      <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;font-family:'Syne',sans-serif;z-index:9999;overflow-y:auto;padding:20px;box-sizing:border-box">
        <div style="background:#0d0d0d;border:1px solid #1a1a1a;border-radius:20px;padding:40px;width:100%;max-width:420px;text-align:center">
          <div style="font-size:48px;margin-bottom:12px">⏳</div>
          <h2 style="color:#fff;font-size:22px;font-weight:800;margin:0 0 8px">Cuenta pendiente de activación</h2>
          <p style="color:#777;font-size:14px;margin:0 0 28px;line-height:1.6">Para activar tu cuenta envía <strong style="color:#39ff14">$5 USDT</strong> por Binance Pay.</p>

          <div style="background:#111;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:24px;text-align:left">
            <div style="font-size:12px;color:#555;margin-bottom:8px">BINANCE PAY</div>
            <div style="font-size:18px;font-weight:700;color:#39ff14;font-family:monospace">ID: 757245944</div>
            <div style="font-size:12px;color:#555;margin-top:4px">o al email: jhonvegabrice@gmail.com</div>
          </div>

          <div style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:14px;margin-bottom:24px">
            <p style="color:#aaa;font-size:13px;margin:0;line-height:1.6">
              📝 En la nota/concepto escribe tu email:<br>
              <strong style="color:#fff">${user.email}</strong>
            </p>
          </div>

          <p style="color:#555;font-size:12px;margin:0 0 20px">⏱ Te activamos en menos de 24 horas</p>

          <button onclick="logoutUser()" style="width:100%;padding:12px;background:transparent;color:#555;border:1px solid #222;border-radius:10px;font-size:13px;cursor:pointer">Cerrar sesión</button>
        </div>
      </div>`;
  }

  // ── Funciones Auth ────────────────────────────────────────
  window.loginGoogle = async function() {
    try {
      await signInWithPopup(auth, provider);
    } catch(e) { showError(e.message); }
  };

  window.loginEmail = async function() {
    const email = document.getElementById('inp-email').value;
    const pass = document.getElementById('inp-pass').value;
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) { showError('Email o contraseña incorrectos'); }
  };

  window.registerEmail = async function() {
    const email = document.getElementById('inp-email').value;
    const pass = document.getElementById('inp-pass').value;
    if (pass.length < 6) { showError('La contraseña debe tener al menos 6 caracteres'); return; }
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      // Crear documento en Firestore con activo: false
      await setDoc(doc(db, 'users', cred.user.uid), {
        email: email,
        activo: false,
        createdAt: new Date().toISOString(),
        ACCOUNTS: [],
        TRADES: []
      });
    } catch(e) { showError(e.code === 'auth/email-already-in-use' ? 'Email ya registrado' : e.message); }
  };

  window.logoutUser = function() {
    signOut(auth);
  };

  function showError(msg) {
    const el = document.getElementById('msg-error');
    if (el) { el.style.display = 'block'; el.textContent = msg; }
  }

  // ── Carga y guarda datos ──────────────────────────────────
  async function loadUserData(uid) {
    const ref = doc(db, 'users', uid);
    const snap = await getDoc(ref);
    if (snap.exists()) {
      const data = snap.data();
      // Cargar datos al localStorage del journal
      if (data.ACCOUNTS) localStorage.setItem('TV_ACCOUNTS', JSON.stringify(data.ACCOUNTS));
      if (data.TRADES) localStorage.setItem('TV_TRADES', JSON.stringify(data.TRADES));
      if (data.TV_ACC) localStorage.setItem('activeAcc', data.TV_ACC);
    }
  }

  async function saveUserData(uid) {
    try {
      const accounts = JSON.parse(localStorage.getItem('TV_ACCOUNTS') || '[]');
      const trades = JSON.parse(localStorage.getItem('TV_TRADES') || '[]');
      const activeAcc = localStorage.getItem('activeAcc') || '0';
      await setDoc(doc(db, 'users', uid), {
        ACCOUNTS: accounts,
        TRADES: trades,
        TV_ACC: activeAcc,
        updatedAt: new Date().toISOString()
      }, { merge: true });
    } catch(e) { console.warn('Save error:', e); }
  }

  // ── Pantalla de carga inicial ─────────────────────────────
  const splash = document.createElement('div');
  splash.id = 'splash';
  splash.style.cssText = 'position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999';
  splash.innerHTML = `
    <div style="font-size:48px;margin-bottom:16px">📊</div>
    <div style="color:#39ff14;font-size:24px;font-weight:800;letter-spacing:-1px;text-shadow:0 0 30px rgba(57,255,20,.5)">TradeVault</div>
    <div style="margin-top:24px;width:40px;height:40px;border:3px solid #111;border-top-color:#39ff14;border-radius:50%;animation:spin 0.8s linear infinite"></div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
  document.body.appendChild(splash);

  // Timeout de seguridad - si Firebase tarda más de 5s mostrar login
  const authTimeout = setTimeout(() => {
    document.getElementById('splash')?.remove();
    showLogin();
  }, 5000);

  // ── Auth State ────────────────────────────────────────────
  onAuthStateChanged(auth, async (user) => {
    clearTimeout(authTimeout);
    document.getElementById('splash')?.remove();
    if (!user) {
      showLogin();
      return;
    }

    // Verificar si la cuenta está activa
    const ref = doc(db, 'users', user.uid);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      // Usuario nuevo (Google) → crear doc con activo: false
      await setDoc(ref, {
        email: user.email,
        activo: false,
        createdAt: new Date().toISOString(),
        ACCOUNTS: [],
        TRADES: []
      });
      showPending(user);
      return;
    }

    const data = snap.data();
    if (!data.activo) {
      showPending(user);
      return;
    }

    // ── Usuario activo → cargar app ──
    await loadUserData(user.uid);

    // El journal usa localStorage keys: TV_ACCOUNTS y TV_TRADES
    // Redirigir las claves que usa el journal original
    if (!localStorage.getItem('ACCOUNTS') && localStorage.getItem('TV_ACCOUNTS')) {
      localStorage.setItem('ACCOUNTS', localStorage.getItem('TV_ACCOUNTS'));
    }
    if (!localStorage.getItem('TRADES') && localStorage.getItem('TV_TRADES')) {
      localStorage.setItem('TRADES', localStorage.getItem('TV_TRADES'));
    }

    // Mostrar botón cerrar sesión en sidebar
    const logoutBtn = document.createElement('button');
    logoutBtn.textContent = '⏻  Cerrar sesión';
    logoutBtn.style.cssText = 'width:calc(100% - 32px);margin:8px 16px;padding:10px;background:transparent;border:1px solid #2a2a2a;color:#888;border-radius:10px;cursor:pointer;font-size:12px;font-family:var(--sans);text-align:left';
    logoutBtn.onmouseover = () => logoutBtn.style.color = '#ff4444';
    logoutBtn.onmouseout = () => logoutBtn.style.color = '#888';
    logoutBtn.onclick = () => { saveUserData(user.uid); signOut(auth); };
    document.getElementById('sidebar')?.appendChild(logoutBtn);

    // Auto-guardar cada 30 segundos
    setInterval(() => saveUserData(user.uid), 30000);

    // Guardar al cerrar/recargar
    window.addEventListener('beforeunload', () => saveUserData(user.uid));

    // Iniciar el journal — esperar a que el DOM esté listo
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => { if (typeof render === 'function') render(); });
    } else {
      if (typeof render === 'function') render();
    }
  });
</script>

<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let ACCS = JSON.parse(localStorage.getItem('et5_accs')||'[]');
let TRADES = JSON.parse(localStorage.getItem('et5_trades')||'[]');

// Migrate old data from et4 if et5 is empty
if(!ACCS.length && localStorage.getItem('et4_accs')){
  ACCS = JSON.parse(localStorage.getItem('et4_accs')||'[]');
  TRADES = JSON.parse(localStorage.getItem('et4')||'[]');
  // Fix field names from old format
  TRADES = TRADES.map(t=>({...t, acc: t.acc??t.account??0, sym: t.sym||t.symbol||'—', market: t.market||'forex', status: t.status||(t.pnl!==0?'tp':'open')}));
  localStorage.setItem('et5_accs', JSON.stringify(ACCS));
  localStorage.setItem('et5_trades', JSON.stringify(TRADES));
}

// Active account id — null means no account selected
let activeAcc = ACCS.length ? ACCS[0].id : null;

function switchAcc(id) {
  activeAcc = id;
  render();
}
let VIEW = 'journal';
let calM = new Date(); calM.setDate(1);
let repTab = 'week';
let pImg = null, charts = {}, aiRes = null, aiLoad = false, dPr = null, eqFilter = 'all';

const save = () => {
  localStorage.setItem('et5_accs', JSON.stringify(ACCS));
  localStorage.setItem('et5_trades', JSON.stringify(TRADES));
};

// Current account object
const acc = () => ACCS.find(a => a.id === activeAcc) || null;
// Trades for current account only
const myTrades = () => TRADES.filter(t => t.acc === activeAcc);

// ── Helpers ──────────────────────────────────
const fmt = n => (n >= 0 ? '+$' : '-$') + Math.abs(n).toLocaleString();
const fmts = n => { const a=Math.abs(n),s=n<0?'-$':'+$'; return a>=1000?s+(a/1000).toFixed(1)+'k':s+a.toFixed(2); };

function stats(ts) {
  // PnL manda: pnl>0=win, pnl<0=loss, pnl===0 se excluye del win rate
  const w=ts.filter(t=>t.pnl>0);
  const l=ts.filter(t=>t.pnl<0);
  const be=ts.filter(t=>t.pnl===0);
  const tot=ts.reduce((s,t)=>s+t.pnl,0);
  const aw=w.length?w.reduce((s,t)=>s+t.pnl,0)/w.length:0;
  const al=l.length?l.reduce((s,t)=>s+t.pnl,0)/l.length:0;
  const wrBase=w.length+l.length; // BE exacto $0 no cuenta en denominador
  // Avg R:R real: usa pnl/risk para calcular R real de cada trade
  const realRR=t=>{
    if(t.risk&&t.risk>0) return t.pnl/t.risk;
    return t.rr||0;
  };
  const counted=ts.filter(t=>t.pnl!==0); // excluir $0 exactos del avg R:R también
  return { tot, wins:w.length, losses:l.length, bes:be.length,
    wr: wrBase>0?w.length/wrBase*100:0,
    aw, al, pf: Math.abs(al)>0?Math.abs(aw/al):0,
    arr: counted.length?counted.reduce((s,t)=>s+realRR(t),0)/counted.length:0,
    best: ts.length?Math.max(...ts.map(t=>t.pnl)):0,
    worst: ts.length?Math.min(...ts.map(t=>t.pnl)):0 };
}

function mdd(ts, start) {
  let peak=start, bal=start, dd=0;
  [...ts].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(t=>{
    bal+=t.pnl; if(bal>peak)peak=bal;
    const d=(peak-bal)/peak*100; if(d>dd)dd=d;
  });
  return dd;
}

function eqCurve(ts, start, filter, withdrawals=[], isProp=false) {
  const sorted=[...ts].sort((a,b)=>a.date.localeCompare(b.date));

  // Apply time filter
  const now=new Date();
  let cutoff=null;
  let cutoffDate=null; // the actual period start date for the anchor point
  if(filter==='1m'){ const d=new Date(now); d.setMonth(d.getMonth()-1); cutoff=d.toISOString().slice(0,10); cutoffDate=cutoff; }
  else if(filter==='3m'){ const d=new Date(now); d.setMonth(d.getMonth()-3); cutoff=d.toISOString().slice(0,10); cutoffDate=cutoff; }
  else if(filter==='6m'){ const d=new Date(now); d.setMonth(d.getMonth()-6); cutoff=d.toISOString().slice(0,10); cutoffDate=cutoff; }
  else if(filter==='1y'){ const d=new Date(now); d.setFullYear(d.getFullYear()-1); cutoff=d.toISOString().slice(0,10); cutoffDate=cutoff; }

  // Running balance before cutoff (accumulated P&L up to start of period)
  let startBal=start;
  if(cutoff) sorted.filter(t=>t.date<cutoff).forEach(t=>startBal+=t.pnl);

  const filtered=cutoff?sorted.filter(t=>t.date>=cutoff):sorted;

  // Build trade map by date
  const tradeMap={};
  filtered.forEach(t=>{
    if(!tradeMap[t.date]) tradeMap[t.date]=0;
    tradeMap[t.date]+=t.pnl;
  });

  // Build withdrawal map by date
  const wdMap={};
  (withdrawals||[]).forEach(w=>{
    if(cutoff && w.date<cutoff) return;
    if(!wdMap[w.date]) wdMap[w.date]=0;
    wdMap[w.date]+=w.amt;
  });

  // All relevant dates merged and sorted
  const allDates=[...new Set([...Object.keys(tradeMap),...Object.keys(wdMap)])].sort();

  if(!allDates.length) return [{x:'inicio', y:startBal, label:'Inicio'}];

  // Anchor point: always at the START of the selected period, not the first trade
  // This makes 1m vs 3m look different even if trades overlap
  const anchorLabel = cutoffDate
    ? new Date(cutoffDate+'T12:00:00').toLocaleDateString('es-MX',{month:'short',day:'numeric'})
    : 'Inicio';
  const pts=[{x: cutoffDate || allDates[0], y: startBal, label: cutoffDate ? anchorLabel : 'Inicio'}];
  let r=startBal;

  allDates.forEach(date=>{
    const fmtLabel=new Date(date+'T12:00:00').toLocaleDateString('es-MX',{month:'short',day:'numeric'});

    if(tradeMap[date]){
      r+=tradeMap[date];
      pts.push({x:date, y:r, label:fmtLabel, pnl:tradeMap[date]});
    }

    if(wdMap[date]){
      r=r-wdMap[date];
      pts.push({x:date, y:r, label:fmtLabel+' 💸', isWD:true});
    }
  });
  return pts;
}

function weekOf(d) {
  const dt=new Date(d); dt.setHours(0,0,0,0);
  const day=dt.getDay(), diff=dt.getDate()-day+(day===0?-6:1);
  return new Date(dt.setDate(diff)).toISOString().slice(0,10);
}

function destroyCharts() {
  Object.values(charts).forEach(c => { if(c && typeof c.destroy === 'function') c.destroy(); });
  charts = {};
  // Also clean up native canvas tooltip elements
  document.querySelectorAll('canvas').forEach(cv => {
    cv.onmousemove = null; cv.onmouseleave = null;
    if (cv._tipEl) { cv._tipEl.remove(); cv._tipEl = null; }
  });
}

// ── Group by date ─────────────────────────────
function dayMap(ts) {
  const m={};
  ts.forEach(t=>{ if(!m[t.date])m[t.date]=[]; m[t.date].push(t); });
  return m;
}

// ── Group by key ──────────────────────────────
function groupBy(ts, key) {
  const m={};
  ts.forEach(t=>{
    const k=t[key];
    if(!m[k])m[k]={pnl:0,count:0,wins:0};
    m[k].pnl+=t.pnl; m[k].count++;
    if(t.pnl>0)m[k].wins++;
  });
  return Object.entries(m).sort((a,b)=>b[1].pnl-a[1].pnl);
}

function rCalendar() {
  if(!acc()) return `<div class="pg">${noAccHTML()}</div>`;
  const a=acc(), ts=myTrades();
  const year=calM.getFullYear(), month=calM.getMonth();
  const mName=calM.toLocaleDateString('es-MX',{month:'long',year:'numeric'});
  const dm=dayMap(ts);
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=new Date().toISOString().slice(0,10);

  let cells='';
  for(let i=0;i<firstDay;i++) cells+=`<div class="cd empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayTs=dm[ds]||[];
    const isToday=ds===today;
    if(!dayTs.length){
      cells+=`<div class="cd notr${isToday?' today':''}"><div class="cdn">${d}</div></div>`;
      continue;
    }
    const totPnl=dayTs.reduce((s,t)=>s+t.pnl,0);
    const cls=totPnl>=0?'win':'loss';
    const count=dayTs.length;
    cells+=`<div class="cd ${cls}${isToday?' today':''}" onclick="showDay('${ds}')">
      <div class="cdn">${d}</div>
      <div class="cdcount">${count} trade${count!==1?'s':''}</div>
      <div class="cdp">${fmts(totPnl)}</div>
    </div>`;
  }

  const mk=`${year}-${String(month+1).padStart(2,'0')}`;
  const mTs=ts.filter(t=>t.date.startsWith(mk));
  const mPnl=mTs.reduce((s,t)=>s+t.pnl,0);
  const greenD=Object.entries(dm).filter(([d,ts])=>d.startsWith(mk)&&ts.reduce((s,t)=>s+t.pnl,0)>0).length;
  const redD=Object.entries(dm).filter(([d,ts])=>d.startsWith(mk)&&ts.reduce((s,t)=>s+t.pnl,0)<0).length;

  const mTsSorted=[...mTs].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const CAL_PER=6;
  const calPage=window._calPage||0;
  const calTotalPages=Math.max(1,Math.ceil(mTsSorted.length/CAL_PER));
  const calPageTs=mTsSorted.slice(calPage*CAL_PER,(calPage+1)*CAL_PER);
  const calPageButtons=calTotalPages<=1?'':('<div style="display:flex;gap:5px;margin-top:10px;justify-content:center;flex-wrap:wrap">'
    +Array.from({length:calTotalPages},(_,i)=>`<button onclick="window._calPage=${i};render()" style="min-width:32px;padding:5px 9px;border-radius:7px;border:1px solid ${i===calPage?'var(--g)':'var(--b)'};background:${i===calPage?'rgba(57,255,20,.13)':'transparent'};color:${i===calPage?'var(--g)':'var(--m)'};font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans)">${i+1}</button>`).join('')
    +'</div>');

  return `<div class="pg">
  <div class="ph">
    <div>
      <div class="ptitle">Calendario</div>
      <div style="font-size:11px;color:var(--m);margin-top:2px">${a.name}</div>
    </div>
  </div>

  <div class="sg" style="margin-bottom:12px">
    <div class="sc" style="position:relative;overflow:hidden">
      ${(()=>{
        const mDayVals = Object.entries(dayMap(mTs)).sort((a,b)=>a[0]>b[0]?1:-1).map(([,ts])=>ts.reduce((s,t)=>s+t.pnl,0));
        const mSparkCol = mPnl >= 0 ? '#39ff14' : '#ff2d2d';
        const mSpark = mDayVals.length >= 2 ? `<div style="position:absolute;bottom:5px;right:5px;opacity:0.45">${sparkline(mDayVals, {w:52,h:20,color:mSparkCol})}</div>` : '';
        return mSpark;
      })()}
      <div class="sl">P&L del mes</div>
      <div class="sv ${mPnl>=0?'g':'r'}" style="position:relative;z-index:1">${fmts(mPnl)}</div>
    </div>
    <div class="sc"><div class="sl">Días activos</div><div class="sv a">${greenD+redD}</div><div class="ss">${greenD}🟢 ${redD}🔴</div></div>
    <div class="sc" style="background:rgba(57,255,20,.06);border-color:rgba(57,255,20,.2)"><div class="sl">Días Ganados</div><div class="sv g">${greenD}</div></div>
    <div class="sc" style="background:rgba(255,45,45,.06);border-color:rgba(255,45,45,.2)"><div class="sl">Días Perdidos</div><div class="sv r">${redD}</div></div>
  </div>

  <div class="desk-2col">
    <div>
      <div class="card">
        <div class="mnav">
          <button class="mnb" onclick="changeMonth(-1)">‹</button>
          <div class="mname">${mName}</div>
          <button class="mnb" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cgrid">
          ${['D','L','M','X','J','V','S'].map(d=>`<div class="cdl">${d}</div>`).join('')}
          ${cells}
        </div>
        <div style="display:flex;gap:12px;margin-top:12px;justify-content:center;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--m)"><div style="width:10px;height:10px;border-radius:3px;background:rgba(57,255,20,.2);border:1px solid rgba(57,255,20,.3)"></div>Ganador</div>
          <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--m)"><div style="width:10px;height:10px;border-radius:3px;background:rgba(255,45,45,.2);border:1px solid rgba(255,45,45,.3)"></div>Perdedor</div>
        </div>
      </div>
    </div>
    <div>
      ${mTsSorted.length?`<div class="card"><div class="ct">Últimas operaciones de ${mName}</div>${calPageTs.map(t=>trow(t)).join('')}${calPageButtons}</div>`:'<div class="card"><div style="text-align:center;padding:30px;color:var(--m);font-size:13px">Sin operaciones este mes</div></div>'}
    </div>
  </div>
  </div>`;
}

function changeMonth(d){ calM.setMonth(calM.getMonth()+d); window._calPage=0; render(); }

function showDay(date){
  const ts=myTrades().filter(t=>t.date===date);
  if(!ts.length) return;
  const pnl=ts.reduce((s,t)=>s+t.pnl,0);
  document.getElementById('det-sheet').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:17px;font-weight:800">${date}</div>
      <div style="font-family:var(--mono);font-size:17px;font-weight:700;color:${pnl>=0?'var(--g)':'var(--r)'}">${fmt(pnl)}</div>

    ${ts.map(t=>trow(t)).join('')}

  // Month filter for sessions - show whenever there are closed trades
  const allClosedMonths=[...new Set(closed.map(t=>t.date.slice(0,7)))].sort().reverse();
  const sesMonth=window._sesMonth||null;
  // Make sure sesMonth is valid, reset if not in list

    : `<div class="card"><div class="ct">Cerrados (${closed.length})</div>${pageClosed.map(t=>trow(t)).join('')}${pageButtons}</div>`}
  </div>`;
}

// ── Profit Factor gauge (media luna) ─────────
function pfGauge(pf) {
  // PF scale: 0 → 0%, 1 → 25%, 2 → 55%, 3 → 80%, 4+ → 100%
  const norm = pf <= 0 ? 0 : pf >= 4 ? 1 : pf < 1 ? pf*0.25 : 0.25 + (pf-1)/3*0.75;
  const clamped = Math.min(Math.max(norm, 0), 1);
  const col = pf >= 3 ? '#39ff14' : pf >= 2 ? '#39ff14' : pf >= 1.5 ? '#ffd740' : pf >= 1 ? '#ff8800' : '#ff2d2d';
  const cx = 36, cy = 34, r = 26, strokeW = 7;
  const halfCirc = Math.PI * r;
  const filled = clamped * halfCirc;
  const x1 = cx - r, y1 = cy, x2 = cx + r, y2 = cy;
  return `<svg viewBox="0 0 72 40" width="68" height="38" style="display:block;overflow:visible">
    <path d="M${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2}" fill="none" stroke="#222" stroke-width="${strokeW}" stroke-linecap="round"/>
    <path d="M${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2}" fill="none" stroke="${col}" stroke-width="${strokeW}" stroke-linecap="round"
      stroke-dasharray="${filled.toFixed(1)} ${(halfCirc*2).toFixed(1)}" stroke-dashoffset="0"
      style="filter:drop-shadow(0 0 3px ${col}88)"/>
  </svg>`;
}

// ══════════════════════════════════════════════
//  SPEEDOMETER SVG (global helper)
// ══════════════════════════════════════════════
function wrSpeedometer(wr){
  const clamped=Math.min(Math.max(wr,0),100);
  const wrCol=clamped>=65?'#39ff14':clamped>=45?'#ffd740':clamped>=30?'#ff8800':'#ff2d2d';
  const cx=80, cy=75, r=52;
  const strokeW=12;
  const halfCirc=Math.PI*r;
  const filled=(clamped/100)*halfCirc;
  const needleAngleDeg=180-(clamped/100)*180;
  const needleRad=needleAngleDeg*Math.PI/180;
  const needleLen=r-4;
  const nx=cx+needleLen*Math.cos(needleRad);
  const ny=cy-needleLen*Math.sin(needleRad);
  const x1=cx-r, y1=cy, x2=cx+r, y2=cy;
  // Unique filter ID per call to avoid conflicts when multiple speedometers on same page
  const uid='ng'+(Math.random()*1e9|0);

  return `<svg viewBox="0 0 160 90" style="width:140px;height:80px;display:block;margin:0 auto;overflow:visible">
    <defs>
      <filter id="${uid}" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="2" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <path d="M${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2}"
      fill="none" stroke="#2a2a2a" stroke-width="${strokeW}" stroke-linecap="round"/>
    <path d="M${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2}"
      fill="none" stroke="${wrCol}" stroke-width="${strokeW}" stroke-linecap="round"
      stroke-dasharray="${filled.toFixed(1)} ${(halfCirc*2).toFixed(1)}"
      stroke-dashoffset="0"/>
    <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(2)}" y2="${ny.toFixed(2)}"
      stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="4" fill="white"/>
    <text x="${cx}" y="${cy+18}" text-anchor="middle"
      font-family="Space Mono,monospace" font-size="15" font-weight="700"
      fill="${wrCol}">${clamped.toFixed(1)}%</text>
  </svg>`;
}

// ══════════════════════════════════════════════
//  SPARKLINE SVG HELPER
// ══════════════════════════════════════════════
function sparkline(values, opts) {
  // values: array of numbers (P&L per day/period)
  // opts: { w, h, color, showPct, pct }
  const w = opts.w || 64;
  const h = opts.h || 28;
  if (!values || values.length < 2) {
    // Single value or empty — just a flat line
    const col = (values && values[0] >= 0) ? '#39ff14' : '#ff2d2d';
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block"><line x1="2" y1="${h/2}" x2="${w-2}" y2="${h/2}" stroke="${col}" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/></svg>`;
  }
  const tot = values.reduce((a,b)=>a+b,0);
  const color = opts.color || (tot >= 0 ? '#39ff14' : '#ff2d2d');
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const pad = 3;
  const pw = w - pad*2;
  const ph = h - pad*2;
  const pts = values.map((v, i) => {
    const x = pad + (i / (values.length - 1)) * pw;
    const y = pad + (1 - (v - min) / range) * ph;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const uid = 'sp' + (Math.random()*1e9|0);
  // Build smooth bezier path
  const buildPath = (pts) => {
    if (pts.length < 2) return '';
    let d = `M${pts[0]}`;
    for (let i = 1; i < pts.length; i++) {
      const [x0, y0] = pts[i-1].split(',').map(Number);
      const [x1, y1] = pts[i].split(',').map(Number);
      const cpx = (x0 + x1) / 2;
      d += ` C${cpx},${y0} ${cpx},${y1} ${x1},${y1}`;
    }
    return d;
  };
  const rawPts = pts.map(p => p.split(',').map(Number));
  const smoothPath = buildPath(pts);
  const firstPt = rawPts[0];
  const lastPt = rawPts[rawPts.length-1];
  const svgBottom = h - pad + 1;
  // Area: go down to bottom from last point, across to first, up to first point, then follow curve
  const areaPath = `M${firstPt[0]},${svgBottom} L${firstPt[0]},${firstPt[1]} ` 
    + buildPath(pts).replace(/^M[\d.,]+ /, '') 
    + ` L${lastPt[0]},${svgBottom} Z`;

  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;overflow:visible">
    <defs>
      <linearGradient id="${uid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <path d="${areaPath}" fill="url(#${uid})"/>
    <path d="${smoothPath}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0 0 2px ${color}88)"/>
    <circle cx="${lastPt[0]}" cy="${lastPt[1]}" r="2.4" fill="${color}" style="filter:drop-shadow(0 0 3px ${color})"/>
  </svg>`;
}

// Build last-N-days P&L array for sparklines
function lastDaysPnl(trades, n) {
  const dm = {};
  trades.forEach(t => { if (!dm[t.date]) dm[t.date] = 0; dm[t.date] += t.pnl; });
  const dates = Object.keys(dm).sort().slice(-n);
  return dates.map(d => dm[d]);
}

// Build weekly P&L array for sparklines (last N weeks)
function lastWeeksPnl(trades, n) {
  const wm = {};
  trades.forEach(t => { const w = weekOf(t.date); if (!wm[w]) wm[w] = 0; wm[w] += t.pnl; });
  const weeks = Object.keys(wm).sort().slice(-n);
  return weeks.map(w => wm[w]);
}

// Build monthly P&L array
function lastMonthsPnl(trades, n) {
  const mm = {};
  trades.forEach(t => { const m = t.date.slice(0,7); if (!mm[m]) mm[m] = 0; mm[m] += t.pnl; });
  const months = Object.keys(mm).sort().slice(-n);
  return months.map(m => mm[m]);
}

  const totalAbsPnlF=symsF.reduce((acc2,[,v])=>acc2+Math.abs(v.pnl),0)||1;
  const symChartF=symsF.length?'<div class="card"><div class="ct">% P&L por Par</div>'
    +symsF.map(([k,v])=>{

    }).join('')+'</div>':'';

  const wrChartF=symsF.length?'<div class="card"><div class="ct">Win Rate por Par</div>'
    +symsF.map(([k,v])=>{
      const wr=Math.round(v.wins/v.count*100);
      const color=wr>=60?'#39ff14':wr>=40?'#ffd740':'#ff2d2d';
      return inlineBar(k, wr, wr+'%', color);
    }).join('')+'</div>':'';

  const emoChartF=emosF.length>1?'<div class="card"><div class="ct">P&L por Emoción</div>'
    +emosF.map(([k,v])=>{
      const pct=Math.round(v.count/tsFiltered.length*100);
      const color=v.pnl>=0?'#39ff14':'#ff2d2d';
      return inlineBar(k, pct, v.count+' trades', color);
    }).join('')+'</div>':'';

  const byMktF=groupBy(tsFiltered,'market');
  const mktSectionF=byMktF.length?'<div class="card"><div class="ct">Trading por Mercado</div>'
    +byMktF.map(([mkt,d])=>{

    }).join('')+'</div>':'';

  return '<div class="pg">'
    +'<div class="ph"><div><div class="ptitle">Reporte</div><div style="font-size:11px;color:var(--m)">'+a.name+'</div></div></div>'
    +'<div class="tabs">'
    +'<button class="tab '+(repTab==='week'?'active':'')+'" onclick="setRep(\'week\')">Semana</button>'
    +'<button class="tab '+(repTab==='month'?'active':'')+'" onclick="setRep(\'month\')">Mes</button>'
    +'<button class="tab '+(repTab==='last'?'active':'')+'" onclick="setRep(\'last\')">Mes ant.</button>'
    +'<button class="tab '+(repTab==='all'?'active':'')+'" onclick="setRep(\'all\')">Todo</button>'
    +'</div>'
    +monthSelector
    +pctSummary
    +(tsFiltered.length
      ? pnlCardF+metricsCardF+monthlyBarChart+monthlyRentCard+mktSectionF+symChartF+wrChartF+emoChartF
      : '<div class="card"><div class="empty-state"><div class="icon">📊</div><h3>Sin datos</h3><p>Sin operaciones '+(selMonth?'en '+new Date(selMonth+'-15').toLocaleDateString('es-MX',{month:'long',year:'numeric'}):'en '+label.toLowerCase())+'</p></div></div>')
    +pnlAndWdCard
    +'</div>';
}

function handleImportDrop(e){
  e.preventDefault();
  const dz=document.getElementById('import-dropz');
  if(dz) dz.style.borderColor='var(--b)';
  const f=e.dataTransfer.files[0];
  if(f) parseImportFile(f);
}
function handleImportFile(e){ const f=e.target.files[0]; if(f) parseImportFile(f); }

function parseImportFile(file){
  const dz=document.getElementById('import-dropz');
  if(dz){ dz.innerHTML='<div style="font-size:24px;margin-bottom:6px">⏳</div><div style="font-size:12px;color:var(--m)">Procesando...</div>'; }
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      let rows=[];
      const name=file.name.toLowerCase();
      if(name.endsWith('.csv')){
        const text=ev.target.result;
        const lines=text.split(/\r?\n/).filter(l=>l.trim());
        if(lines.length<2){ showImportResult(0,0,'El CSV no tiene datos',[]); return; }
        const sep=lines[0].includes(';')?';':',';
        const headers=lines[0].split(sep).map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
        rows=lines.slice(1).map(l=>{
          const vals=l.split(sep).map(v=>v.trim().replace(/^"|"$/g,''));
          const obj={};
          headers.forEach((h,i)=>{ obj[h]=vals[i]||''; });
          return obj;
        }).filter(r=>Object.values(r).some(v=>v));
      } else {
        const data=new Uint8Array(ev.target.result);
        const wb=XLSX.read(data,{type:'array',cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const raw=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
        rows=raw.map(r=>{const o={};Object.keys(r).forEach(k=>o[k.toLowerCase().trim()]=r[k]);return o;});
      }
      processImportRows(rows);
    }catch(err){
      showImportResult(0,0,'Error al leer el archivo: '+err.message,[]);
    }
  };
  if(file.name.toLowerCase().endsWith('.csv')) reader.readAsText(file);
  else reader.readAsArrayBuffer(file);
}

function findImportCol(sampleRow, candidates){
  const keys=Object.keys(sampleRow).map(k=>k.toLowerCase());
  for(const c of candidates){
    const found=keys.find(k=>k.includes(c));
    if(found!==undefined){
      return Object.keys(sampleRow).find(k=>k.toLowerCase()===found)||null;
    }
  }
  return null;
}

function processImportRows(rows){
  if(!rows||!rows.length){ showImportResult(0,0,'Sin filas válidas en el archivo',[]); return; }
  const a=acc(); if(!a) return;
  const existingKeys=new Set(TRADES.filter(t=>t.acc===activeAcc&&t._importId).map(t=>t._importId));

  const s=rows[0];
  const colDate=findImportCol(s,['open time','opentime','close time','closetime','date','time','fecha','datetime','closedate']);
  const colSym=findImportCol(s,['symbol','pair','instrument','item','par','símbolo','ticker']);
  const colSide=findImportCol(s,['type','side','direction','action','tipo','operación']);
  // Prefer "net profit" or explicit pnl cols over generic "profit" to avoid gross confusion
  const colPnl=findImportCol(s,['net profit','netprofit','pnl','p&l','p / l','gain','result','ganancia','beneficio','profit']);
  const colLot=findImportCol(s,['volume','lots','size','lotes','lot','volumen']);
  const colEntry=findImportCol(s,['open price','price open','entry price','entry','entrada','openprice']);
  const colExit=findImportCol(s,['close price','price close','exit price','exit','cierre','closeprice']);
  const colSl=findImportCol(s,['sl','stop loss','stoploss','stop_loss']);
  const colTp=findImportCol(s,['tp','take profit','takeprofit','take_profit']);
  const colComm=findImportCol(s,['commission','fee','comisión','commision','fees']);
  const colSwap=findImportCol(s,['swap']);

  // Helper: parse numeric string safely from any locale format
  const parseNum=(str)=>{
    if(str===null||str===undefined||str==='') return null;
    const s=String(str).replace(/\s/g,'');
    // Handle formats like 1.234,56 (European) or 1,234.56 (US)
    const cleaned=s.replace(/[^0-9.,-]/g,'');
    if(cleaned.includes(',')&&cleaned.includes('.')){
      // Determine which is thousands separator vs decimal
      const lastComma=cleaned.lastIndexOf(',');
      const lastDot=cleaned.lastIndexOf('.');
      if(lastComma>lastDot) return parseFloat(cleaned.replace(/\./g,'').replace(',','.'));
      else return parseFloat(cleaned.replace(/,/g,''));
    }
    if(cleaned.includes(',')&&!cleaned.includes('.')) return parseFloat(cleaned.replace(',','.'));
    return parseFloat(cleaned);
  };

  // Helper: parse date from any common format → YYYY-MM-DD
  const parseDate=(raw)=>{
    if(!raw) return new Date().toISOString().slice(0,10);
    if(typeof raw==='number') return new Date(Math.round((raw-25569)*86400*1000)).toISOString().slice(0,10);
    const str=String(raw).trim();
    // YYYY-MM-DD or YYYY-MM-DD HH:MM:SS
    if(/^\d{4}-\d{2}-\d{2}/.test(str)) return str.slice(0,10);
    // DD/MM/YYYY or DD/MM/YYYY HH:MM
    if(/^\d{2}\/\d{2}\/\d{4}/.test(str)){
      const [d,m,y]=str.split('/'); return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    }
    // MM/DD/YYYY (US format)
    if(/^\d{1,2}\/\d{1,2}\/\d{4}/.test(str)){
      const parts=str.split('/');
      const y=parts[2].slice(0,4);
      const m=parseInt(parts[0]),d=parseInt(parts[1]);
      // Disambiguate: if first part > 12, it must be day (DD/MM), else assume MM/DD
      if(m>12) return `${y}-${String(d).padStart(2,'0')}-${String(m).padStart(2,'0')}`;
      return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }
    // DD.MM.YYYY
    if(/^\d{2}\.\d{2}\.\d{4}/.test(str)){
      const [d,m,y]=str.split('.'); return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    }
    // Try native Date parse as fallback
    const d=new Date(str);
    if(!isNaN(d)) return d.toISOString().slice(0,10);
    return new Date().toISOString().slice(0,10);
  };

  let imported=0, skipped=0;
  const preview=[];

  rows.forEach((row,idx)=>{
    try{
      const dateStr=parseDate(colDate?row[colDate]:null);

      // Clean symbol: remove #, spaces, dots, keep alphanumeric and common chars
      const sym=colSym?String(row[colSym]).toUpperCase().replace(/[#\s\.]/g,'').trim():'';
      if(!sym||sym.length<2){ skipped++; return; }

      const sideRaw=colSide?String(row[colSide]).toLowerCase():'buy';
      const side=(sideRaw.includes('sell')||sideRaw.includes('short')||sideRaw==='s')?'Sell':'Buy';

      // PnL: use the broker's reported profit directly — broker already nets everything
      // Do NOT subtract commission/swap again if column is "net profit"
      const pnlRaw=colPnl?parseNum(row[colPnl])??0:0;
      const commission=colComm?Math.abs(parseNum(row[colComm])??0):0;
      const swap=colSwap?parseNum(row[colSwap])??0:0;

      // If broker exports "profit" (gross) + separate commission + swap → net = profit + commission(already negative in most brokers) + swap
      // Safest assumption: pnlRaw is already the net profit as shown in history
      const pnl=isNaN(pnlRaw)?0:pnlRaw;

      // Skip rows with no meaningful data (balance/deposit lines common in MT4/MT5 exports)
      if(!sym&&pnl===0){ skipped++; return; }

      const importId=`${dateStr}_${sym}_${pnlRaw.toFixed(2)}_${idx}`;
      if(existingKeys.has(importId)){ skipped++; return; }

      const en=parseNum(colEntry?row[colEntry]:null)??0;
      const ex=parseNum(colExit?row[colExit]:null)??0;
      const sl=parseNum(colSl?row[colSl]:null)??0;
      const tp=parseNum(colTp?row[colTp]:null)??0;
      const lot=colLot?parseNum(row[colLot])??null:null;

      // Status based purely on PnL (pnl manda)
      const status=pnl>0?'tp':pnl<0?'sl':'be';

      // Calculate risk from entry/SL if available (|en - sl| as pip distance reference)
      // We can't know $ risk without lot size and pip value, so leave as 0 unless we have it
      // risk=0 means Avg R:R won't count this trade (honest)
      const risk=0;

      // Try to calculate R:R objective from entry/sl/tp prices if available
      let rr=0;
      if(en>0&&sl>0&&tp>0){
        const riskPips=Math.abs(en-sl);
        const rewardPips=Math.abs(tp-en);
        if(riskPips>0) rr=parseFloat((rewardPips/riskPips).toFixed(2));
      }

      // Detect session from timestamp if available
      let session='importado';
      if(colDate&&row[colDate]){
        const rawDate=String(row[colDate]);
        const hourMatch=rawDate.match(/(\d{2}):\d{2}/);
        if(hourMatch){
          const h=parseInt(hourMatch[1]);
          if(h>=8&&h<12) session='london';
          else if(h>=13&&h<17) session='ny';
          else if(h>=0&&h<7) session='asia';
          else if(h>=12&&h<14) session='overlap';
          else session='london';
        }
      }

      const t={
        id:Date.now()+Math.random()*1000|0+idx,
        acc:activeAcc,
        _importId:importId,
        date:dateStr,
        sym,
        market:detectImportMarket(sym),
        side,
        etype:'Importado',
        session,
        emo:'😐 Neutral',
        en, sl, tp, ex,
        risk,
        rr,
        lot,
        commission:commission||null,
        swap:swap||null,
        pnl,
        status,
        notes:'Importado desde archivo',
        img:null,
      };
      TRADES.push(t);
      existingKeys.add(importId);
      imported++;
      if(preview.length<5) preview.push({sym,date:dateStr,side,pnl,status});
    }catch(e){ skipped++; }
  });

  save();
  showImportResult(imported, skipped, null, preview);
}

function detectImportMarket(sym){
  const s=sym.toUpperCase();
  const crypto=['BTC','ETH','XRP','SOL','BNB','ADA','DOGE','LTC','USDT'];
  if(crypto.some(c=>s.startsWith(c)||s.endsWith(c))) return 'crypto';
  const comm=['XAU','XAG','OIL','GAS','COPPER','WHEAT','CORN','BRENT','WTI'];
  if(comm.some(c=>s.includes(c))) return 'commodities';
  const idx=['US30','US500','US100','GER40','UK100','SPX','NAS','DAX','NDX','DOW'];
  if(idx.some(c=>s.includes(c))) return 'indices';
  const stocks=['AAPL','TSLA','MSFT','AMZN','NVDA','META','GOOGL','NFLX'];
  if(stocks.some(c=>s===c||s.startsWith(c))) return 'stocks';
  return 'forex';
}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">

        <div style="font-family:var(--mono);font-size:26px;font-weight:700;color:var(--g)">${imported}</div>
      </div>

        <div style="font-size:9px;color:var(--m);font-weight:700;letter-spacing:1px;margin-bottom:4px">OMITIDOS/DUP.</div>
        <div style="font-family:var(--mono);font-size:26px;font-weight:700;color:var(--m)">${skipped}</div>
      </div>
    </div>
    ${preview.length?'<div style="font-size:11px;color:var(--m);font-weight:700;margin-bottom:8px">Muestra:</div>'
      +preview.map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #1a1a1a;font-size:11px">
        <span style="font-weight:700;color:var(--t)">${p.sym}</span>
        <span class="tsd ${p.side==='Buy'?'L':'S'}">${p.side}</span>
        <span style="color:var(--m)">${p.date}</span>
        <span style="font-family:var(--mono);font-weight:700;color:${p.pnl>=0?'var(--g)':'var(--r)'}">${p.pnl>=0?'+':''}$${Math.abs(p.pnl).toFixed(2)}</span>
      </div>`).join(''):''}
    <button class="btn bp" style="margin-top:14px" onclick="sv('trades')">Ver Trades →</button>
  </div>`;
}

function drawSessionChart(){
  const canvas=document.getElementById('ch-sessions'); if(!canvas) return;
  if(charts['ch-sessions']){ charts['ch-sessions'].destroy(); delete charts['ch-sessions']; }
  const SESSION_ORDER=['london','ny','asia','overlap','sydney','premarket'];
  const SESSION_SHORT={london:'LDN',ny:'NY',asia:'Asia',overlap:'Overlap',sydney:'Sidney',premarket:'Pre'};
  const allClosed=closedTrades();
  const sesMonth=window._sesMonth||null;
  const sesFiltered=sesMonth?allClosed.filter(t=>t.date.startsWith(sesMonth)):allClosed;
  const sessionGroups={};
  sesFiltered.forEach(t=>{
    const sk=t.session||'london';
    if(!sessionGroups[sk]) sessionGroups[sk]={tp:0,sl:0,be:0};
    if(t.status==='tp') sessionGroups[sk].tp++;
    else if(t.status==='sl') sessionGroups[sk].sl++;
    else if(t.status==='be') sessionGroups[sk].be++;
  });
  const active=SESSION_ORDER.filter(k=>sessionGroups[k]);
  if(!active.length) return;
  charts['ch-sessions']=new Chart(canvas,{
    type:'bar',
    data:{
      labels:active.map(k=>SESSION_SHORT[k]||k),
      datasets:[
        {label:'TP',data:active.map(k=>sessionGroups[k]?.tp||0),backgroundColor:'rgba(57,255,20,.75)',borderRadius:4,borderSkipped:false},
        {label:'SL',data:active.map(k=>sessionGroups[k]?.sl||0),backgroundColor:'rgba(255,45,45,.75)',borderRadius:4,borderSkipped:false},
        {label:'BE',data:active.map(k=>sessionGroups[k]?.be||0),backgroundColor:'rgba(255,215,64,.75)',borderRadius:4,borderSkipped:false},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:true,position:'top',labels:{color:'#888',font:{family:'Space Mono',size:10},boxWidth:10,padding:10}},
        tooltip:{backgroundColor:'#111',borderColor:'#1c1c1c',borderWidth:1,bodyColor:'#e8e8e8',bodyFont:{family:'Space Mono',size:11}}
      },
      scales:{

// ══════════════════════════════════════════════
//  CHART DRAWING
// ══════════════════════════════════════════════
function drawEq(id, ts, start, color='#39ff14', filter='all', withdrawals=[], isProp=false) {
  const canvas = document.getElementById(id); if (!canvas) return;
  const curve = eqCurve(ts, start, filter, withdrawals, isProp);
  if (!curve.length) return;

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const parent = canvas.parentElement;
  const W = parent.clientWidth || parent.offsetWidth || 320;
  const H = parent.clientHeight || parent.offsetHeight || 260;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.style.display = 'block';
  ctx.scale(dpr, dpr);

  const vals = curve.map(d => d.y);
  const labels = curve.map(d => d.label || d.x.slice(5));
  const minV = Math.min(...vals), maxV = Math.max(...vals);
  const range = maxV - minV || Math.abs(start) * 0.1 || 10;

  // ── Nice round Y axis ticks based on real balance values ──
  const nTicks = 5;
  const rawStep = range / (nTicks - 1);
  const magnitude = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const niceStep = Math.ceil(rawStep / magnitude) * magnitude;
  const yAxisMin = Math.floor(minV / niceStep) * niceStep;
  const yAxisMax = yAxisMin + niceStep * nTicks;

  // Layout
  const PAD_LEFT = 46, PAD_RIGHT = 12, PAD_TOP = 14, PAD_BOT = 28;
  const cW = W - PAD_LEFT - PAD_RIGHT;
  const cH = H - PAD_TOP - PAD_BOT;

  const toX = i => PAD_LEFT + (i / (vals.length - 1 || 1)) * cW;
  const toY = v => PAD_TOP + (1 - (v - yAxisMin) / (yAxisMax - yAxisMin)) * cH;

  const xs = vals.map((_, i) => toX(i));
  const ys = vals.map(v => toY(v));

  // ── Grid with real balance values ────────────
  ctx.strokeStyle = '#1c1c1c';
  ctx.lineWidth = 1;
  const useK = Math.abs(yAxisMax) >= 10000;
  const fmtY = v => useK ? '$' + (v / 1000).toFixed(1) + 'k' : '$' + Math.round(v);
  for (let i = 0; i <= nTicks; i++) {
    const v = yAxisMin + niceStep * i;
    if (v < minV - niceStep * 0.1) continue; // don't show ticks below actual min
    const y = toY(v);
    if (y < PAD_TOP - 2 || y > H - PAD_BOT + 2) continue;
    ctx.beginPath(); ctx.moveTo(PAD_LEFT, y); ctx.lineTo(W - PAD_RIGHT, y); ctx.stroke();
    const tooCloseToMin = Math.abs(y - toY(minV)) < 14;
    const tooCloseToMax = Math.abs(y - toY(maxV)) < 14;
    if (!tooCloseToMin && !tooCloseToMax) {
      ctx.fillStyle = '#444';
      ctx.font = '8px Space Mono, monospace';
      ctx.textAlign = 'right';
      ctx.fillText(fmtY(v), PAD_LEFT - 4, y + 3);
    }
  }
  // Always show actual min and max balance (real account values)
  [minV, maxV].forEach(v => {
    const y = toY(v);
    if (y < PAD_TOP - 2 || y > H - PAD_BOT + 2) return;
    ctx.fillStyle = v === maxV ? '#39ff14' : '#888';
    ctx.font = '8px Space Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText(fmtY(v), PAD_LEFT - 4, y + 3);
  });

  // X labels — max 4, spaced by actual date position, skip if too close
  ctx.fillStyle = '#555'; ctx.font = '8px Space Mono, monospace'; ctx.textAlign = 'center';
  const minLabelGap = 44; // minimum pixels between labels
  const labelIdxs = [0]; // always show first
  for (let i = 1; i < vals.length - 1; i++) {
    const lastIdx = labelIdxs[labelIdxs.length - 1];
    if (xs[i] - xs[lastIdx] >= minLabelGap && xs[xs.length-1] - xs[i] >= minLabelGap) {
      labelIdxs.push(i);
      if (labelIdxs.length >= 3) break; // max 2 middle labels
    }
  }
  labelIdxs.push(vals.length - 1); // always show last
  labelIdxs.forEach(i => {
    ctx.fillText(labels[i], xs[i], H - PAD_BOT + 14);
  });

  // ── Filled area under curve ──────────────────
  if (vals.length >= 2) {
    ctx.beginPath();
    ctx.moveTo(xs[0], toY(yAxisMin));
    ctx.lineTo(xs[0], ys[0]);
    for (let i = 1; i < xs.length; i++) {
      const cpx = (xs[i - 1] + xs[i]) / 2;
      ctx.bezierCurveTo(cpx, ys[i - 1], cpx, ys[i], xs[i], ys[i]);
    }
    ctx.lineTo(xs[xs.length - 1], toY(yAxisMin));
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, PAD_TOP, 0, PAD_TOP + cH);
    grad.addColorStop(0, color + '28');
    grad.addColorStop(1, color + '04');
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // ── Curve line — always base color (green) ──
  if (vals.length >= 2) {
    ctx.beginPath();
    ctx.moveTo(xs[0], ys[0]);
    for (let i = 1; i < xs.length; i++) {
      const cpx = (xs[i - 1] + xs[i]) / 2;
      ctx.bezierCurveTo(cpx, ys[i - 1], cpx, ys[i], xs[i], ys[i]);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.8;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.shadowColor = color;
    ctx.shadowBlur = 3;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // ── Dots — only first and last ──────────────
  vals.forEach((v, i) => {
    const isFirst = i === 0;
    const isLast = i === vals.length - 1;
    const isWD = curve[i]?.isWD;
    if (!isFirst && !isLast && !isWD) return;
    // Last dot: red if lower than previous, green if higher
    const dotColor = isWD ? '#ff2d2d'
      : isLast && i > 0 ? (v < vals[i - 1] ? '#ff2d2d' : color)
      : color;
    const r = isFirst || isLast ? 5.5 : 4;
    ctx.beginPath(); ctx.arc(xs[i], ys[i], r, 0, Math.PI * 2);
    ctx.fillStyle = dotColor;
    ctx.shadowColor = dotColor;
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // ── Tooltip on hover ────────────────────────
  canvas._eqData = { xs, ys, vals, labels, curve, color };
  canvas.onmousemove = function(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    let closest = 0, minDist = Infinity;
    xs.forEach((x, i) => { const d = Math.abs(x - mx); if (d < minDist) { minDist = d; closest = i; } });
    if (minDist > 40) { canvas._tooltip = null; drawEqTooltip(canvas, null); return; }
    canvas._tooltip = closest;
    drawEqTooltip(canvas, closest);
  };
  canvas.onmouseleave = function() { canvas._tooltip = null; drawEqTooltip(canvas, null); };
}

function drawEqTooltip(canvas, idx) {
  let tip = canvas._tipEl;
  if (!tip) { tip = document.createElement('div'); tip.style.cssText='position:absolute;pointer-events:none;background:#111;border:1px solid #222;border-radius:8px;padding:7px 11px;font-size:11px;font-family:Space Mono,monospace;z-index:99;white-space:nowrap'; canvas.parentElement.style.position='relative'; canvas.parentElement.appendChild(tip); canvas._tipEl = tip; }
  if (idx === null) { tip.style.display = 'none'; return; }
  const d = canvas._eqData; if (!d) return;
  const pt = d.curve[idx];
  const prev = idx > 0 ? d.vals[idx - 1] : null;
  const diff = prev !== null ? d.vals[idx] - prev : 0;
  const col = diff >= 0 ? '#39ff14' : '#ff2d2d';
  tip.style.display = 'block';
  tip.innerHTML = `<div style="color:#888;font-size:9px">${d.labels[idx]}</div><div style="color:#eee;font-size:13px;font-weight:700">$${d.vals[idx].toLocaleString()}</div>${diff !== 0 ? `<div style="color:${col};font-size:10px">${diff >= 0 ? '+' : ''}$${diff.toFixed(2)}</div>` : ''}`;
  const x = d.xs[idx], y = d.ys[idx];
  const tW = 120, tH = 60;
  tip.style.left = (x + 10 + tW > canvas.offsetWidth ? x - tW - 10 : x + 10) + 'px';
  tip.style.top = Math.max(0, y - tH / 2) + 'px';
}

function hBarChart(id, labels, data, colors) {
  const canvas=document.getElementById(id); if(!canvas)return;
  charts[id]=new Chart(canvas,{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:6,borderSkipped:false}]},
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,

function drawReportCharts() {
  const now=new Date();
  const wStart=weekOf(now.toISOString().slice(0,10));
  const thisM=now.toISOString().slice(0,7);
  const lastM=new Date(now.getFullYear(),now.getMonth()-1,1).toISOString().slice(0,7);
  const allTs=closedTrades();
  const tsPeriods={week:allTs.filter(t=>t.date>=wStart),month:allTs.filter(t=>t.date.startsWith(thisM)),last:allTs.filter(t=>t.date.startsWith(lastM)),all:allTs};
  const ts=tsPeriods[repTab];

  // % mensual de la cuenta (barras verticales)
  const monthlyCanvas=document.getElementById('ch-monthly'); if(monthlyCanvas){
    const a2=acc();
    // Build per-month % from ALL closed trades, not filtered by tab
    const allClosed=closedTrades();
    const monthMap={};
    allClosed.forEach(t=>{
      const mk=t.date.slice(0,7);
      if(!monthMap[mk])monthMap[mk]=0;
      monthMap[mk]+=t.pnl;
    });
    const monthKeys=Object.keys(monthMap).sort();
    const monthLabels=monthKeys.map(mk=>{
      const d=new Date(mk+'-15');
      return d.toLocaleDateString('es-MX',{month:'short',year:'2-digit'});
    });
    const monthPcts=monthKeys.map(mk=>parseFloat((monthMap[mk]/(a2?a2.start:1)*100).toFixed(2)));
    const monthColors=monthPcts.map(v=>v>=0?'rgba(57,255,20,.8)':'rgba(255,45,45,.8)');
    charts['ch-monthly']=new Chart(monthlyCanvas,{
      type:'bar',
      data:{labels:monthLabels,datasets:[{data:monthPcts,backgroundColor:monthColors,borderRadius:6,borderSkipped:false}]},
      options:{
        responsive:true,maintainAspectRatio:false,
        layout:{padding:{top:22}},
        plugins:{
          legend:{display:false},
          tooltip:{backgroundColor:'#111',borderColor:'#1c1c1c',borderWidth:1,bodyColor:'#e8e8e8',bodyFont:{family:'Space Mono',size:12},
            callbacks:{label:ctx=>(ctx.raw>=0?'+':'')+ctx.raw+'%'}},
          datalabels:{
            anchor:'end',
            align:'end',
            offset:2,
            color:ctx=>monthPcts[ctx.dataIndex]>=0?'#39ff14':'#ff2d2d',
            font:{family:'Space Mono',size:9,weight:'bold'},
            formatter:v=>(v>=0?'+':'')+v+'%'
          }
        },
        scales:{
          x:{grid:{color:'#1c1c1c'},ticks:{color:'#aaa',font:{size:10}},border:{display:false}},
          y:{grid:{color:'#1c1c1c'},ticks:{color:'#555',font:{family:'Space Mono',size:10},callback:v=>v+'%'},border:{display:false}}
        }
      },
      plugins:[ChartDataLabels]
    });
  }
}

function calcRR() {
  const en=parseFloat(document.getElementById('f-en').value);
  const sl=parseFloat(document.getElementById('f-sl').value);
  const tp=parseFloat(document.getElementById('f-tp').value);
  const el=document.getElementById('rr-val');
  if(en&&sl&&tp){
    const risk=Math.abs(en-sl);
    const reward=Math.abs(tp-en);
    if(risk>0){
      const rr=(reward/risk).toFixed(2);
      el.textContent=rr+'R';
      el.style.color=rr>=1.5?'var(--g)':'var(--y)';
    }
  } else { el.textContent='—'; el.style.color='var(--m)'; }
  calcPnl();
}

function calcRiskPct() {
  const a=acc(); if(!a) return;
  const risk=parseFloat(document.getElementById('f-risk').value);
  const bal=a.start+myTrades().reduce((s,t)=>s+t.pnl,0);
  const el=document.getElementById('risk-pct');
  if(risk&&bal) el.textContent=(risk/bal*100).toFixed(2)+'% del capital ($'+bal.toLocaleString()+')';
  else el.textContent='— % del capital';
}

function calcPnl() {
  const en=parseFloat(document.getElementById('f-en')?.value);
  const ex=parseFloat(document.getElementById('f-ex')?.value);
  const risk=parseFloat(document.getElementById('f-risk')?.value);
  const sl=parseFloat(document.getElementById('f-sl')?.value);
  const el=document.getElementById('pnl-val');
  if(!el) return;
  if(en&&ex&&risk&&sl){
    const riskPips=Math.abs(en-sl);
    const resultPips=Math.abs(ex-en);
    if(riskPips>0){
      const side=document.getElementById('f-side').value;
      const dir = side==='Buy'?(ex>en?1:-1):(ex<en?1:-1);
      let pnl=(resultPips/riskPips)*risk*dir;
      // Force negative if SL selected
      if(tradeStatus==='sl') pnl=-Math.abs(pnl);
      el.textContent=(pnl>=0?'+$':'-$')+Math.abs(pnl).toFixed(2);
      el.style.color=pnl>=0?'var(--g)':'var(--r)';
      document.getElementById('f-pnl').value=pnl.toFixed(2);
      calcNetPnl();
    }
  } else {
    // If risk set and SL selected, prefill from risk directly
    if(tradeStatus==='sl'){
      const risk2=parseFloat(document.getElementById('f-risk')?.value);
      if(risk2){
        el.textContent='-$'+risk2.toFixed(2);
        el.style.color='var(--r)';
        document.getElementById('f-pnl').value=(-risk2).toFixed(2);
        calcNetPnl(); return;
      }
    }
    el.textContent='—'; el.style.color='var(--m)';
  }
}

function calcNetPnl(){
  const pnl=parseFloat(document.getElementById('f-pnl')?.value)||0;
  const comm=parseFloat(document.getElementById('f-commission')?.value)||0;
  const swap=parseFloat(document.getElementById('f-swap')?.value)||0;
  const net=pnl-Math.abs(comm)+swap;
  const el=document.getElementById('net-pnl-val');
  const wrap=document.getElementById('net-pnl-preview');
  if(el&&(comm||swap)){
    if(wrap) wrap.style.display='flex';
    el.textContent=(net>=0?'+$':'-$')+Math.abs(net).toFixed(2);
    el.style.color=net>=0?'var(--g)':'var(--r)';
  } else if(wrap){ wrap.style.display='none'; }
}

function saveTrade(){
  const en=parseFloat(document.getElementById('f-en').value)||0;
  const sl=parseFloat(document.getElementById('f-sl').value)||0;
  const tp=parseFloat(document.getElementById('f-tp').value)||0;
  const risk=parseFloat(document.getElementById('f-risk').value)||0;
  const riskPips=en&&sl?Math.abs(en-sl):0;
  const rewardPips=en&&tp?Math.abs(tp-en):0;
  const rr=riskPips>0?parseFloat((rewardPips/riskPips).toFixed(2)):0;
  const rawPnl=tradeStatus==='open'?0:parseFloat(document.getElementById('f-pnl').value)||0;
  const commission=parseFloat(document.getElementById('f-commission').value)||0;
  const swap=parseFloat(document.getElementById('f-swap').value)||0;
  const grossPnl=tradeStatus==='sl'?-Math.abs(rawPnl):rawPnl;
  const pnl=grossPnl-Math.abs(commission)+swap;
  const t={
    id:Date.now(), acc:activeAcc,
    date:document.getElementById('f-date').value,
    sym:document.getElementById('f-sym').value.toUpperCase()||'—',
    market:activeMkt,

    session:document.getElementById('f-session').value,

    emo:document.getElementById('f-emo')?.value||'😐 Neutral',

    ex:tradeStatus==='open'?null:parseFloat(document.getElementById('f-ex').value)||0,
    risk, rr,
    lot: parseFloat(document.getElementById('f-lot').value)||null,
    commission: commission||null,
    swap: swap||null,
    pnl,
    status:tradeStatus,
    notes:document.getElementById('f-notes').value,
    img:pImg,
  };
  TRADES.push(t); save(); pImg=null; closeAdd(); render();
}
